*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
 width: 100%; height: 100%;
 overflow: hidden;
 background: var(--bg);
 font-family: 'Share Tech Mono', monospace;
}

/* ── BACKROOMS BACKGROUND ── */
.room-bg {
 position: fixed; inset: 0;
 background:
   repeating-linear-gradient(
     90deg,
     transparent,
     transparent 59px,
     rgba(120,95,20,0.15) 59px,
     rgba(120,95,20,0.15) 60px
   ),
   repeating-linear-gradient(
     0deg,
     transparent,
     transparent 59px,
     rgba(120,95,20,0.15) 59px,
     rgba(120,95,20,0.15) 60px
   ),
   radial-gradient(ellipse 80% 60% at 50% 40%, #1c1400 0%, #0a0800 100%);
 animation: roomFlicker 0.08s infinite;
}

@keyframes roomFlicker {
 0%,100% { opacity: 1; }
 92% { opacity: 0.97; }
 93% { opacity: 0.85; }
 94% { opacity: 0.97; }
}

/* Ceiling tiles */
.ceiling {
 position: fixed;
 top: 0; left: 0; right: 0;
 height: 18vh;
 background: repeating-linear-gradient(
   90deg,
   #111000 0px, #111000 119px,
   #1a1800 119px, #1a1800 120px
 );
 border-bottom: 2px solid #2a2200;
}

/* Fluorescent lights */
.lights-row {
 position: fixed;
 top: 3vh;
 left: 0; right: 0;
 display: flex;
 justify-content: space-around;
 padding: 0 5%;
}
.light-tube {
 width: 12vw;
 height: 8px;
 background: #ffe87a;
 border-radius: 4px;
 box-shadow: 0 0 8px 2px #ffe87a, 0 0 30px 8px rgba(255,232,100,0.4), 0 0 80px 20px rgba(255,220,80,0.15);
 animation: tubeFlicker 3s infinite;
}
.light-tube:nth-child(2) { animation-delay: 0.7s; }
.light-tube:nth-child(3) { animation-delay: 1.4s; }
.light-cone {
 position: absolute;
 top: 8px;
 left: 50%;
 transform: translateX(-50%);
 width: 20vw;
 height: 60vh;
 background: linear-gradient(to bottom, rgba(255,232,100,0.08) 0%, transparent 100%);
 clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
 pointer-events: none;
}

@keyframes tubeFlicker {
 0%,100% { opacity: 1; }
 80% { opacity: 1; }
 82% { opacity: 0.3; }
 83% { opacity: 1; }
 86% { opacity: 0.6; }
 87% { opacity: 1; }
}

/* Carpet floor */
.floor {
 position: fixed;
 bottom: 0; left: 0; right: 0;
 height: 22vh;
 background:
   repeating-linear-gradient(
     45deg,
     #1a0e00 0px, #1a0e00 3px,
     #221500 3px, #221500 6px
   );
 border-top: 2px solid #2a1a00;
}

/* Wall texture */
.walls {
 position: fixed;
 top: 18vh; bottom: 22vh;
 left: 0; right: 0;
 background: linear-gradient(180deg,
   #1c1400 0%,
   #221800 30%,
   #1c1400 70%,
   #181000 100%
 );
}
.walls::before {
 content: '';
 position: absolute;
 inset: 0;
 background:
   repeating-linear-gradient(
     90deg,
     transparent,
     transparent 199px,
     rgba(80,60,10,0.3) 199px,
     rgba(80,60,10,0.3) 200px
   );
}

/* Yellow glow overlay */
.glow-overlay {
 position: fixed; inset: 0;
 background: radial-gradient(ellipse 60% 50% at 50% 35%,
   rgba(255,220,50,0.04) 0%,
   transparent 70%
 );
 pointer-events: none;
}

/* ── SCENE LAYOUT ── */
.scene {
 position: relative;
 z-index: 10;
 width: 100%; height: 100%;
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 80px;
}

/* ── LAMP (kept from original, recolored) ── */
.lamp {
 height: 46vmin;
 min-height: 280px;
 max-height: 380px;
 overflow: visible !important;
 flex-shrink: 0;
 filter: drop-shadow(0 0 20px rgba(200,169,60,0.3));
}
.lamp-cord {
 stroke: hsl(40, 20%, calc(var(--cord-l, 35) * 1%));
 transition: stroke .1s;
}
.lamp-light { opacity: var(--on); }
.fill-opening { fill: hsl(40, calc((10 + var(--on) * 60) * 1%), calc((18 + var(--on) * 65) * 1%)); }
.fill-base-top { fill: hsl(40, calc(var(--on) * 25%), calc((30 + var(--on) * 35) * 1%)); }
.fill-base-side { fill: hsl(40, calc(var(--on) * 25%), calc((15 + var(--on) * 32) * 1%)); }
.fill-post { fill: hsl(40, calc(var(--on) * 20%), calc((18 + var(--on) * 32) * 1%)); }
.fill-shade { fill: hsl(40, calc(var(--on) * 35%), calc((9 + var(--on) * 15) * 1%)); }
.lamp-hit { cursor: grab; fill: transparent; }
.lamp-hit:active { cursor: grabbing; }

/* ── LOGIN CARD ── */
.card {
 width: 340px;
 padding: 36px 30px 30px;
 background: rgba(10, 8, 0, 0.88);
 backdrop-filter: blur(20px);
 border-radius: 4px;
 border: 1px solid rgba(180,140,40,0.2);
 box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 24px 60px rgba(0,0,0,0.9);
 opacity: 0;
 transform: scale(0.9) translateX(12px);
 transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1),
             transform 0.9s cubic-bezier(0.22, 1, 0.36, 1),
             border-color 0.9s, box-shadow 0.9s;
 pointer-events: none;
 position: relative;
}
.card.is-active {
 opacity: 1;
 transform: scale(1) translateX(0);
 pointer-events: auto;
 border-color: rgba(200,169,60,0.4);
 box-shadow: 0 0 0 1px rgba(0,0,0,0.8), 0 24px 60px rgba(0,0,0,0.9), 0 0 40px rgba(200,169,60,0.1);
}
.card::before {
 content: '';
 position: absolute;
 top: 0; left: 0; right: 0;
 height: 2px;
 background: linear-gradient(90deg, transparent, var(--yellow), transparent);
 opacity: 0.6;
}

.brand {
 display: flex;
 align-items: center;
 gap: 12px;
 margin-bottom: 24px;
}
.brand-icon {
 width: 36px; height: 36px;
 border-radius: 3px;
 background: rgba(200,169,60,0.1);
 border: 1px solid rgba(200,169,60,0.3);
 display: flex;
 align-items: center;
 justify-content: center;
 font-size: 18px;
}
.brand-name {
 font-family: 'Creepster', cursive;
 font-size: 1.4rem;
 color: var(--yellow);
 letter-spacing: 0.1em;
 text-shadow: 0 0 20px rgba(200,169,60,0.5);
}
.brand-tag {
 font-size: 0.6rem;
 color: rgba(200,169,60,0.5);
 letter-spacing: 0.2em;
 text-transform: uppercase;
}

.warning-text {
 font-size: 0.65rem;
 color: rgba(200,169,60,0.4);
 letter-spacing: 0.12em;
 margin-bottom: 20px;
 text-transform: uppercase;
}

.card-sep {
 width: 100%;
 height: 1px;
 background: linear-gradient(90deg, transparent, rgba(200,169,60,0.3), transparent);
 margin-bottom: 20px;
}

.field { margin-bottom: 14px; }
.field label {
 display: block;
 font-size: 0.62rem;
 color: rgba(200,169,60,0.5);
 letter-spacing: 0.15em;
 text-transform: uppercase;
 margin-bottom: 6px;
}
.field-wrap { position: relative; display: flex; align-items: center; }
.field-icon {
 position: absolute;
 left: 12px;
 color: rgba(200,169,60,0.4);
 pointer-events: none;
 display: flex;
 font-size: 13px;
}
.field-wrap input {
 width: 100%;
 padding: 11px 12px 11px 36px;
 background: rgba(200,169,60,0.03);
 border: 1px solid rgba(200,169,60,0.15);
 border-radius: 2px;
 color: #d4b84a;
 font-family: 'Share Tech Mono', monospace;
 font-size: 0.82rem;
 outline: none;
 transition: border-color 0.3s, box-shadow 0.3s;
}
.field-wrap input::placeholder { color: rgba(200,169,60,0.2); }
.field-wrap input:focus {
 border-color: rgba(200,169,60,0.5);
 box-shadow: 0 0 0 3px rgba(200,169,60,0.05);
}

.field-toggle {
 position: absolute; right: 10px;
 background: none; border: none; cursor: pointer;
 color: rgba(200,169,60,0.4); display: flex;
 font-size: 13px; padding: 0;
 transition: color 0.2s;
}
.field-toggle:hover { color: var(--yellow); }

.forgot {
 display: flex;
 justify-content: flex-end;
 margin-top: -6px;
 margin-bottom: 18px;
}
.forgot a {
 font-size: 0.63rem;
 color: rgba(200,169,60,0.4);
 text-decoration: none;
 letter-spacing: 0.05em;
 transition: color 0.2s;
}
.forgot a:hover { color: var(--yellow); }

.btn-submit {
 width: 100%;
 padding: 12px;
 background: transparent;
 border: 1px solid rgba(200,169,60,0.4);
 color: var(--yellow);
 font-family: 'Share Tech Mono', monospace;
 font-size: 0.85rem;
 letter-spacing: 0.2em;
 text-transform: uppercase;
 cursor: pointer;
 border-radius: 2px;
 position: relative;
 overflow: hidden;
 transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.btn-submit::before {
 content: '';
 position: absolute;
 inset: 0;
 background: linear-gradient(90deg, transparent, rgba(200,169,60,0.1), transparent);
 transform: translateX(-100%);
 transition: transform 0.5s;
}
.btn-submit:hover::before { transform: translateX(100%); }
.btn-submit:hover {
 border-color: var(--yellow);
 box-shadow: 0 0 20px rgba(200,169,60,0.2);
}

.signup {
 text-align: center;
 margin-top: 14px;
 font-size: 0.68rem;
 color: rgba(200,169,60,0.3);
 letter-spacing: 0.05em;
}
.signup a { color: rgba(200,169,60,0.5); text-decoration: none; transition: color 0.2s; }
.signup a:hover { color: var(--yellow); }

@keyframes shake {
 0%,100% { transform: translateX(0); }
 20% { transform: translateX(-6px); }
 40% { transform: translateX(6px); }
 60% { transform: translateX(-4px); }
 80% { transform: translateX(4px); }
}

/* ── AMBIENT SOUND INDICATOR ── */
.sound-indicator {
 position: fixed;
 bottom: 24px; right: 24px;
 font-size: 0.6rem;
 color: rgba(200,169,60,0.3);
 letter-spacing: 0.1em;
 text-transform: uppercase;
 cursor: pointer;
 transition: color 0.3s;
 z-index: 100;
}
.sound-indicator:hover { color: var(--yellow); }

/* ── STATIC OVERLAY ── */
.static-overlay {
 position: fixed; inset: 0;
 pointer-events: none;
 z-index: 5;
 background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
 opacity: 0.3;
 animation: staticShift 0.15s infinite;
}
@keyframes staticShift {
 0% { background-position: 0 0; }
 100% { background-position: 200px 200px; }
}

/* ── VIGNETTE ── */
.vignette {
 position: fixed; inset: 0;
 pointer-events: none;
 z-index: 6;
 background: radial-gradient(ellipse at center,
   transparent 40%,
   rgba(0,0,0,0.7) 100%
 );
}

/* ── SCANLINES ── */
.scanlines {
 position: fixed; inset: 0;
 pointer-events: none;
 z-index: 7;
 background: repeating-linear-gradient(
   0deg,
   transparent,
   transparent 2px,
   rgba(0,0,0,0.03) 2px,
   rgba(0,0,0,0.03) 4px
 );
}

/* ── ENTITY (rare flicker shadow) ── */
.entity {
 position: fixed;
 bottom: 22vh;
 right: 8vw;
 width: 60px;
 height: 120px;
 background: rgba(0,0,0,0.4);
 filter: blur(8px);
 opacity: 0;
 pointer-events: none;
 z-index: 4;
 animation: entityAppear 20s infinite;
}
@keyframes entityAppear {
 0%,90%,100% { opacity: 0; }
 91% { opacity: 0.6; }
 92% { opacity: 0; }
 93% { opacity: 0.4; }
 94% { opacity: 0; }
}

/* ── ACCESS DENIED/GRANTED ── */
#access-msg {
 position: fixed;
 inset: 0;
 display: none;
 align-items: center;
 justify-content: center;
 z-index: 200;
 background: rgba(0,0,0,0.95);
}
#access-msg.show { display: flex; }
.access-inner {

}
@keyframes accessIn {

 to { opacity: 1; transform: scale(1); }
}
.access-code {

}
.access-status {

 letter-spacing: 0.2em;
}
.access-sub {
 font-size: 0.7rem;
 color: rgba(200,169,60,0.5);
 margin-top: 12px;
 letter-spacing: 0.1em;
}

 <script>
   // ── LAMP PHYSICS ──
   const ROOT = document.documentElement;
   const card = document.getElementById('js-card');
   const cord = document.getElementById('js-cord');
   const hit = document.getElementById('js-hit');
   const lampEl = document.querySelector('.lamp');

   const AX = 124, AY = 190, REST_X = 124, REST_Y = 348, TRIGGER_DIST = 55;
   let dragging = false, animating = false, lightOn = false, curX = REST_X, curY = REST_Y;

   function toSVG(sx, sy) {
     const pt = lampEl.createSVGPoint();
     pt.x = sx; pt.y = sy;
     return pt.matrixTransform(lampEl.getScreenCTM().inverse());
   }

   function buildCord(tx, ty) {
     const dx = tx - AX, dy = ty - AY;
     const sag = Math.max(4, 30 - Math.hypot(dx, dy) * 0.06);
     const c1x = AX + dx*0.15+sag, c1y = AY + dy*0.30+sag;
     const c2x = AX + dx*0.70-sag*0.3, c2y = AY + dy*0.72-sag*0.2;
     return `M${AX},${AY} C${c1x},${c1y} ${c2x},${c2y} ${tx},${ty}`;
   }

   function updateCord(tx, ty) {
     curX = tx; curY = ty;
     cord.setAttribute('d', buildCord(tx, ty));
     const tension = Math.min(Math.hypot(tx-REST_X, ty-REST_Y)/120, 1);
     ROOT.style.setProperty('--cord-l', Math.round(35 + tension*45));
   }

   function springBack(fromX, fromY, triggered) {
     if (animating) return;
     animating = true;
     const dur = triggered ? 380 : 500;
     const t0 = performance.now();
     function tick(now) {
       const t = Math.min((now-t0)/dur, 1);
       const fn = triggered ? easeElastic(t) : easeOutBounce(t);
       updateCord(fromX+(REST_X-fromX)*fn, fromY+(REST_Y-fromY)*fn);
       if (t < 1) { requestAnimationFrame(tick); return; }
       updateCord(REST_X, REST_Y);
       animating = false;
     }
     requestAnimationFrame(tick);
   }

   function easeElastic(t) {
     if (!t || t===1) return t;
     return Math.pow(2,-10*t)*Math.sin((t*10-0.75)*(2*Math.PI/3))+1;
   }
   function easeOutBounce(t) {
     if (t<1/2.75) return 7.5625*t*t;
     if (t<2/2.75) { t-=1.5/2.75; return 7.5625*t*t+0.75; }
     if (t<2.5/2.75) { t-=2.25/2.75; return 7.5625*t*t+0.9375; }
     t-=2.625/2.75; return 7.5625*t*t+0.984375;
   }

   function client(e) {
     return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY};
   }

   function onDown(e) { if (animating) return; e.preventDefault(); dragging = true; }
   function onMove(e) {
     if (!dragging) return; e.preventDefault();
     const {x,y} = client(e);
     const sv = toSVG(x,y);
     updateCord(sv.x, Math.max(AY+20, sv.y));
   }
   function onUp() {
     if (!dragging) return; dragging = false;
     const dist = Math.hypot(curX-REST_X, curY-REST_Y);
     if (dist > TRIGGER_DIST) toggleLight();
     springBack(curX, curY, dist > TRIGGER_DIST);
   }

   [hit, cord].forEach(el => {
     el.addEventListener('mousedown', onDown);
     el.addEventListener('touchstart', onDown, {passive:false});
   });
   window.addEventListener('mousemove', onMove);
   window.addEventListener('mouseup', onUp);
   window.addEventListener('touchmove', onMove, {passive:false});
   window.addEventListener('touchend', onUp);

   function toggleLight() {
     lightOn = !lightOn;
     ROOT.style.setProperty('--on', lightOn ? '1' : '0');
     card.classList.toggle('is-active', lightOn);
   }

   // ── PASSWORD TOGGLE ──
   const pwInput = document.getElementById('password');
   document.getElementById('js-toggle-pw').addEventListener('click', () => {
     pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
   });

   // ── FORM SUBMIT ──
   document.getElementById('js-submit').addEventListener('click', function () {
     const email = document.getElementById('email').value.trim();
     const pass = pwInput.value;
     if (!email || !pass) {
       this.style.animation = 'none';
       void this.offsetHeight;
       this.style.animation = 'shake .4s ease';
       return;
     }
     this.disabled = true;
     this.textContent = '[ AUTHENTICATING... ]';
     setTimeout(() => {
       document.getElementById('access-msg').classList.add('show');
       setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
     }, 1500);
   });

   // ── AMBIENT SOUND ──
   let audioCtx = null, noiseNode = null, playing = false;
   document.getElementById('sound-btn').addEventListener('click', function() {
     if (!playing) {
       audioCtx = new (window.AudioContext || window.webkitAudioContext)();
       const bufferSize = audioCtx.sampleRate * 2;
       const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
       const data = buffer.getChannelData(0);
       for (let i = 0; i < bufferSize; i++) data[i] = (Math.random()*2-1)*0.04;
       noiseNode = audioCtx.createBufferSource();
       noiseNode.buffer = buffer; noiseNode.loop = true;
       const filter = audioCtx.createBiquadFilter();
       filter.type = 'lowpass'; filter.frequency.value = 400;
       noiseNode.connect(filter); filter.connect(audioCtx.destination);
       noiseNode.start();
       playing = true; this.textContent = '[ AMBIENT: ON ]';
     } else {
       noiseNode.stop(); audioCtx.close();
       playing = false; this.textContent = '[ AMBIENT: OFF ]';
     }
   });
 </script>
