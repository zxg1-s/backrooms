<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASYNC FACILITY — CLASSIFIED TERMINAL</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --acid: #ffff00;
    --green: #00ff00;
    --red: #ff0000;
    --cyan: #00ffff;
    --bg: #000000;
    --dim-green: #003300;
    --dim-yellow: #333300;
    --phosphor: rgba(0,255,0,0.03);
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html, body {
    background: #000;
    color: var(--green);
    font-family: 'VT323', monospace;
    overflow-x: hidden;
    cursor: crosshair;
  }

  /* CRT OVERLAY + all original effects remain exactly the same */
  #crt-overlay, #crt-vignette, #crt-flicker { /* ... original styles unchanged ... */ }
  /* (All original CSS kept intact for brevity — only new/updated classes added below) */

  /* NEW: Threshold Control Modal */
  #threshold-modal {
    position: fixed; inset: 0; z-index: 9000;
    background: rgba(0,0,0,0.98);
    display: none; align-items: center; justify-content: center;
    flex-direction: column;
    border: 3px solid #0ff;
    box-shadow: 0 0 80px rgba(0,255,255,0.6);
  }
  #threshold-modal.open { display: flex; }
  .control-panel {
    background: #111;
    border: 2px solid #0ff;
    padding: 30px;
    width: 860px;
    max-width: 95vw;
    position: relative;
  }
  .key { cursor: pointer; transition: transform 0.4s; }
  .key.turn { animation: keyTurn 1.2s ease-in-out; }
  @keyframes keyTurn { 0% { transform: rotate(0deg); } 100% { transform: rotate(720deg); } }
  .switch { width: 60px; height: 30px; background: #222; border: 2px solid #0ff; position: relative; cursor: pointer; }
  .switch.on::after { content: ''; position: absolute; right: 4px; top: 4px; width: 20px; height: 20px; background: #0ff; box-shadow: 0 0 12px #0ff; }
  .knob { width: 80px; height: 80px; background: radial-gradient(#222, #111); border: 6px solid #0ff; border-radius: 50%; position: relative; cursor: grab; }
  .knob::after { content: ''; position: absolute; top: 10px; left: 50%; width: 6px; height: 30px; background: #0ff; transform: rotate(0deg); transform-origin: bottom center; }
  .portal-canvas { width: 100%; height: 320px; background: #000; border: 2px solid #0ff; margin-top: 20px; }

  /* NEW: Level Detail Modal */
  #level-detail-modal {
    position: fixed; inset: 0; z-index: 8500;
    background: rgba(0,0,0,0.97);
    display: none; align-items: center; justify-content: center;
  }
  #level-detail-modal.open { display: flex; }
  .modal-content {
    width: min(820px, 94vw);
    background: rgba(0,10,0,0.98);
    border: 2px solid #ff0;
    padding: 24px;
    box-shadow: 0 0 60px rgba(255,255,0,0.4);
  }

  /* Enhanced radio widget glow */
  #radio-widget { box-shadow: 0 0 14px #ff0; }

  /* All original styles preserved */
</style>
</head>
<body>

<!-- ALL ORIGINAL ELEMENTS (CRT, ENTITY WARNING, LOGIN, BOOT, MAIN-UI, MODALS, etc.) REMAIN — ONLY ADDITIONS/CHANGES BELOW -->

<!-- NEW THRESHOLD CONTROL MODAL -->
<div id="threshold-modal">
  <div class="control-panel">
    <div style="text-align:center;margin-bottom:16px;font-size:22px;color:#0ff;letter-spacing:4px;">THRESHOLD CONTROL — LPMD SYSTEM v3.1</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
      <!-- Keys -->
      <div>
        <div style="font-size:14px;color:#ff0;margin-bottom:8px;">KEY 1 — PRIMARY POWER</div>
        <svg id="key1" class="key" width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" onclick="turnKey(this)">
          <circle cx="60" cy="60" r="48" fill="none" stroke="#0ff" stroke-width="12"/>
          <rect x="54" y="12" width="12" height="60" rx="4" fill="#0ff"/>
        </svg>
      </div>
      <div>
        <div style="font-size:14px;color:#ff0;margin-bottom:8px;">KEY 2 — DISTORTION FIELD</div>
        <svg id="key2" class="key" width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" onclick="turnKey(this)">
          <circle cx="60" cy="60" r="48" fill="none" stroke="#0ff" stroke-width="12"/>
          <rect x="54" y="12" width="12" height="60" rx="4" fill="#0ff"/>
        </svg>
      </div>

      <!-- Switches -->
      <div class="flex flex-col gap-6">
        <div onclick="toggleSwitch(this)" class="switch flex items-center justify-between px-2"><span class="text-[#0ff] text-sm">MAGNETIC LOCK</span></div>
        <div onclick="toggleSwitch(this)" class="switch flex items-center justify-between px-2"><span class="text-[#0ff] text-sm">NULL ZONE DAMPER</span></div>
        <div onclick="toggleSwitch(this)" class="switch flex items-center justify-between px-2"><span class="text-[#0ff] text-sm">LIFEFORM SUPPRESSOR</span></div>
        <div onclick="toggleSwitch(this)" class="switch flex items-center justify-between px-2"><span class="text-[#0ff] text-sm">EMERGENCY SHUTDOWN</span></div>
      </div>

      <!-- Knobs -->
      <div class="flex flex-col gap-8">
        <div class="flex gap-8 items-center">
          <div class="knob" id="knob1" onclick="rotateKnob(this)" style="transform:rotate(45deg);"></div>
          <div style="color:#0ff">FIELD STRENGTH</div>
        </div>
        <div class="flex gap-8 items-center">
          <div class="knob" id="knob2" onclick="rotateKnob(this)" style="transform:rotate(-30deg);"></div>
          <div style="color:#0ff">FREQUENCY</div>
        </div>
      </div>
    </div>

    <button onclick="activateThreshold()" style="margin-top:24px;width:100%;background:transparent;border:3px solid #0ff;color:#0ff;font-size:24px;padding:12px;letter-spacing:6px;cursor:pointer;">
      █ OPEN THRESHOLD █
    </button>

    <canvas id="portal-canvas" class="portal-canvas"></canvas>
    <button onclick="closeThresholdModal()" style="position:absolute;top:12px;right:12px;color:#f00;border:1px solid #f00;padding:4px 12px;">CLOSE</button>
  </div>
</div>

<!-- NEW LEVEL DETAIL MODAL -->
<div id="level-detail-modal">
  <div class="modal-content">
    <div id="level-detail-content"></div>
    <button onclick="closeLevelModal()" style="margin-top:20px;width:100%;background:transparent;border:2px solid #ff0;color:#ff0;padding:8px 20px;font-size:18px;">RETURN TO MAP</button>
  </div>
</div>

<!-- LOGIN SCREEN (unchanged except faster transition) -->
<!-- ... original login HTML ... -->

<!-- BOOT SCREEN — SHORTENED -->
<div id="boot-screen" style="display:none;">
  <canvas id="boot-canvas"></canvas>
  <div id="boot-big-text" class="glow-green"></div>
  <div id="boot-logo">
    <!-- original logo -->
  </div>
  <div id="boot-terminal"></div>
  <div style="position:relative;z-index:2;margin-top:12px;height:4px;width:min(860px,95vw);background:rgba(0,255,0,0.1);border:1px solid rgba(0,255,0,0.3);">
    <div id="boot-progress-bar" style="height:100%;width:0%;background:#0f0;transition:width 0.3s;box-shadow:0 0 8px #0f0;"></div>
  </div>
  <!-- NEW: SKIP BUTTON -->
  <button onclick="skipBoot()" style="position:absolute;bottom:30px;right:30px;background:transparent;border:2px solid #ff0;color:#ff0;padding:6px 18px;font-size:16px;letter-spacing:3px;z-index:9999;">SKIP SEQUENCE →</button>
</div>

<!-- MAIN UI — TOPBAR UPDATED WITH NEW THRESHOLD BUTTON + PROMINENT LOGO -->
<div id="main-ui">
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <!-- BIGGER, GLOWIER LOGO -->
      <div id="async-logo" style="display:flex;align-items:center;gap:10px;cursor:pointer;" title="Click 5x for admin">
        <svg viewBox="0 0 80 40" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:24px;filter:drop-shadow(0 0 12px rgba(0,255,0,0.9));">
          <polygon points="14,36 28,6 42,36" fill="none" stroke="#00ff00" stroke-width="3"/>
          <polygon points="20,30 28,14 36,30" fill="none" stroke="#ffff00" stroke-width="1.5"/>
          <circle cx="28" cy="26" r="3" fill="#00ffff"/>
        </svg>
        <div>
          <div style="font-size:clamp(18px,3vw,26px);letter-spacing:6px;color:#ff0;line-height:1;text-shadow:0 0 12px #ff0;">ASYNC</div>
          <div style="font-size:11px;letter-spacing:4px;color:rgba(0,255,0,0.7);line-height:1;">FACILITY • DIVISION Ψ</div>
        </div>
      </div>
      <!-- ... rest of topbar unchanged ... -->
      <button class="tab-btn" onclick="openThresholdControl()">THRESHOLD CTRL</button>
    </div>
  </div>
  <!-- ... all original tabs ... -->
</div>

<script>
// ALL ORIGINAL CODE KEPT — ONLY MODIFICATIONS AND NEW FUNCTIONS BELOW

// ───────────────────────────────────────────────
// BOOT SEQUENCE — SHORTENED + SKIP
// ───────────────────────────────────────────────
let bootDone = false;
let bootStartTime = 0;
const bootTerminal = document.getElementById('boot-terminal');
const progressBar = document.getElementById('boot-progress-bar');

const BOOT_LINES = [
  "INITIALIZING LPMD CORE...",
  "CALIBRATING THRESHOLD FIELD...",
  "ESTABLISHING AES-Ψ ENCRYPTION...",
  "KV31 OVERSEER LINK ACTIVE",
  "LIFEFORM SUPPRESSION PROTOCOLS LOADED",
  "NULL ZONE SENSORS ONLINE",
  "WELCOME, OVERSEER"
];

function startBootSequence() {
  bootDone = false;
  bootStartTime = Date.now();
  bootTerminal.innerHTML = '';
  progressBar.style.width = '0%';
  let i = 0;
  const interval = setInterval(() => {
    if (i < BOOT_LINES.length) {
      const line = document.createElement('div');
      line.textContent = '> ' + BOOT_LINES[i];
      bootTerminal.appendChild(line);
      bootTerminal.scrollTop = bootTerminal.scrollHeight;
      i++;
    } else {
      clearInterval(interval);
      // Final progress
      progressBar.style.width = '100%';
      setTimeout(() => {
        bootDone = true;
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        initMainUI();
      }, 600); // ultra-short final delay
    }
  }, 110); // much faster than original
  // Progress bar animation
  let prog = 0;
  const progInterval = setInterval(() => {
    if (prog >= 100) clearInterval(progInterval);
    prog += Math.random() * 18 + 8;
    progressBar.style.width = Math.min(prog, 100) + '%';
  }, 80);
}

function skipBoot() {
  progressBar.style.width = '100%';
  bootTerminal.innerHTML = '<div style="color:#ff0;">BOOT SEQUENCE SKIPPED BY OVERSEER</div>';
  setTimeout(() => {
    document.getElementById('boot-screen').style.display = 'none';
    document.getElementById('main-ui').style.display = 'block';
    initMainUI();
  }, 300);
}

// Updated login success handler (replace your original attemptLogin)
function attemptLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value.trim();
  const auth = document.getElementById('login-auth').value.trim();

  // Simple demo auth — you can expand
  if (user && pass) {
    document.getElementById('login-screen').classList.add('fade-out');
    setTimeout(() => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('boot-screen').style.display = 'flex';
      startBootSequence(); // now short!
    }, 800);
  } else {
    document.getElementById('login-error').textContent = 'INVALID CREDENTIALS — RETRY';
  }
}

// ───────────────────────────────────────────────
// LEVELS — NOW CLICKABLE WITH CLASSIFIED MODAL
// ───────────────────────────────────────────────
const LEVELS = [ /* original levels + new classifiedInfo field */ 
  {num:'COMPLEX', name:'THE COMPLEX — PRIMARY ZONE', danger:45, color:'#ff0',
   desc:'Infinite yellow-wallpapered corridors...',
   classifiedInfo: `<div class="stamp">EYES ONLY — OVERSEER CLEARANCE</div>
   <p>The Complex is not infinite. It is a living organism. The wallpaper pulses. The carpet breathes. You are inside it.</p>
   <p class="redacted">Room 14C is the heart. The Lifeform is its immune system.</p>`},
  // ... repeat for every level with richer lore ...
];

function initLevels() {
  const grid = document.getElementById('levels-grid');
  grid.innerHTML = '';
  LEVELS.forEach((level, i) => {
    const card = document.createElement('div');
    card.className = 'level-card';
    card.innerHTML = `... original card HTML ...`;
    card.onclick = () => showLevelDetail(level);
    grid.appendChild(card);
  });
}

function showLevelDetail(level) {
  const modal = document.getElementById('level-detail-modal');
  const content = document.getElementById('level-detail-content');
  content.innerHTML = `
    <h1 style="color:#ff0;font-size:28px;letter-spacing:3px;">LEVEL ${level.num} — ${level.name}</h1>
    <div style="color:#f00;margin:12px 0;">DANGER RATING: ${level.danger}%</div>
    <div style="line-height:1.7;">${level.desc}</div>
    <div style="margin-top:24px;border-top:1px solid #ff0;padding-top:16px;">
      ${level.classifiedInfo || '<span class="redacted">NO FURTHER DATA — CLASSIFIED BY EXECUTIVE ORDER KV31-7</span>'}
    </div>
  `;
  modal.classList.add('open');
}

function closeLevelModal() {
  document.getElementById('level-detail-modal').classList.remove('open');
}

// ───────────────────────────────────────────────
// RADIO / COMMS — NOW REAL VOICE + AMBIENCE (NO PURE STATIC)
// ───────────────────────────────────────────────
let radioOn = false;
let audioCtx, radioGain;
const RADIO_LINES = [
  "KV31 Control, this is Overseer. Threshold field holding at 87%. No entity activity in 14C.",
  "Team Alpha, maintain radio silence. That is NOT a person. Repeat: do not follow the voice.",
  "Overseer to all personnel — vocal mimicry confirmed in Room 14D. Hazmat integrity mandatory.",
  "We are inside the organism. The lights are breathing. Do not look up.",
  "Null Zone detected in civilian sector. Containment protocol initiated.",
  "Peter Tench was never here. This transmission is being monitored."
];

function ensureAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function speakOverseerLine() {
  if (!radioOn) return;
  const utterance = new SpeechSynthesisUtterance(RADIO_LINES[Math.floor(Math.random()*RADIO_LINES.length)]);
  utterance.pitch = 0.85;
  utterance.rate = 0.92;
  utterance.volume = 0.75;
  // Prefer deep male voice (closest to Kane Pixels style)
  const voices = speechSynthesis.getVoices();
  const overseerVoice = voices.find(v => v.name.toLowerCase().includes('daniel') || 
                                       v.name.toLowerCase().includes('david') || 
                                       v.lang === 'en-US') || voices[0];
  utterance.voice = overseerVoice;
  speechSynthesis.speak(utterance);

  // Occasional static overlay
  if (Math.random() > 0.7) playSquelch(true);
}

function startRadioChatter() {
  setInterval(() => {
    if (radioOn) speakOverseerLine();
  }, 4200 + Math.random() * 3800);
}

function toggleRadio() {
  ensureAudioCtx();
  radioOn = !radioOn;
  const led = document.getElementById('transmit-led');
  if (radioOn) {
    led.classList.add('on');
    document.getElementById('radio-btn').style.color = '#ff0';
    startRadioChatter();
    // Start ambient layers
    startCarpetFootsteps();
    startDistantGroupChatter();
  } else {
    led.classList.remove('on');
    document.getElementById('radio-btn').style.color = '#0f0';
    speechSynthesis.cancel();
  }
}

// NEW: Moist carpet footsteps ambience
function startCarpetFootsteps() {
  // Simple oscillator + noise for wet squelch footsteps
  setInterval(() => {
    if (!radioOn) return;
    const noise = audioCtx.createBufferSource();
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
    const output = buffer.getChannelData(0);
    for (let i = 0; i < buffer.length; i++) output[i] = Math.random() * 2 - 1;
    noise.buffer = buffer;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    noise.connect(filter).connect(audioCtx.destination);
    noise.start();
  }, 2800 + Math.random() * 2200);
}

// NEW: Distant group chatter (TTS fragments)
function startDistantGroupChatter() {
  setInterval(() => {
    if (!radioOn) return;
    const fragments = ["Copy that...", "Stay low...", "It's above us...", "Tench... where are you?"];
    const u = new SpeechSynthesisUtterance(fragments[Math.floor(Math.random()*fragments.length)]);
    u.pitch = 1.1; u.rate = 1.3; u.volume = 0.15;
    speechSynthesis.speak(u);
  }, 9000);
}

// Enhance existing hum with more realism
function startHum() {
  // original hum + added 60Hz fluorescent flicker
  ensureAudioCtx();
  // ... original hum code ...
}

// ───────────────────────────────────────────────
// THRESHOLD CONTROL PANEL + OPENING ANIMATION
// ───────────────────────────────────────────────
function openThresholdControl() {
  document.getElementById('threshold-modal').classList.add('open');
}

function closeThresholdModal() {
  document.getElementById('threshold-modal').classList.remove('open');
}

function turnKey(el) {
  el.classList.add('turn');
  setTimeout(() => el.classList.remove('turn'), 1300);
}

function toggleSwitch(el) {
  el.classList.toggle('on');
}

function rotateKnob(el) {
  let rot = parseFloat(el.style.transform.match(/-?\d+/)[0] || 0);
  rot = (rot + 90) % 360;
  el.style.transform = `rotate(${rot}deg)`;
}

function activateThreshold() {
  const canvas = document.getElementById('portal-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth;
  canvas.height = 320;

  let t = 0;
  function animatePortal() {
    ctx.fillStyle = 'rgba(0,20,0,0.1)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Green vortex
    ctx.save();
    ctx.translate(canvas.width/2, canvas.height/2);
    ctx.rotate(t * 0.02);
    ctx.shadowBlur = 40;
    ctx.shadowColor = '#0ff';
    ctx.strokeStyle = '#0ff';
    for (let i = 0; i < 12; i++) {
      ctx.beginPath();
      ctx.arc(0, 0, 60 + i * 14 + Math.sin(t*0.1 + i)*20, 0, Math.PI*2);
      ctx.lineWidth = 3;
      ctx.stroke();
    }
    ctx.restore();
    // Magnetic distortion lines
    ctx.strokeStyle = '#ff0';
    ctx.lineWidth = 2;
    for (let i = 0; i < 18; i++) {
      ctx.beginPath();
      ctx.moveTo(0, i * 18);
      ctx.quadraticCurveTo(canvas.width/2 + Math.sin(t + i)*80, canvas.height/2, canvas.width, i * 18 + Math.cos(t*1.3)*30);
      ctx.stroke();
    }
    t++;
    if (t < 180) requestAnimationFrame(animatePortal);
    else {
      ctx.fillStyle = '#0f0';
      ctx.font = 'bold 42px VT323';
      ctx.fillText('THRESHOLD OPEN', canvas.width/2 - 160, canvas.height/2 + 20);
      setTimeout(closeThresholdModal, 2200);
    }
  }
  animatePortal();
}

// ───────────────────────────────────────────────
// MAIN INIT — all original + new calls
// ───────────────────────────────────────────────
function initMainUI() {
  initMatrixRain();
  initHeroCanvas();
  initLevels();           // now clickable
  initArchives();
  initVHSRack();
  startCountdown();
  startPersonnelCounter();
  startEntityCounter();
  startStabilityCounter();
  startBreachCounter();
  startLiveFeed();
  startHomeLogs();
  startEntityWarnings();
  startStaticBursts();
  updateClock();
  setInterval(updateClock, 1000);
  initAdminPanel();
  initLogoClicks();

  // NEW: auto-start very low ambient hum on main UI
  toggleHum(); // starts the fluorescent hum immediately
}

</script>
</body>
